services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: membership
      POSTGRES_PASSWORD: membership
      POSTGRES_DB: membership
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U membership"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    environment:
      PORT: "8080"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: membership
      DB_PASSWORD: membership
      DB_NAME: membership
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: